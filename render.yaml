databases:
  - name: chat-noir-db
    plan: free
    databaseName: chat_noir
    user: chat_noir_user

services:
  - type: web
    name: chat-noir-api
    runtime: docker
    plan: free
    healthCheckPath: /api/actuator/health
    envVars:
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: chat-noir-db
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: chat-noir-db
          property: password
      - key: SPRING_DATASOURCE_URL
        sync: false

      - key: SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE
        value: "3"
      - key: SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE
        value: "1"

      - key: SPRING_JPA_HIBERNATE_DDL_AUTO
        value: update

      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRATION
        value: "86400000"

      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_REGION
        value: eu-north-1
      - key: AWS_S3_BUCKET
        value: s3-chat-noir-test

      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false

      - key: APP_BASE_URL
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false

      - key: GRAPHIQL_ENABLED
        value: "false"
      - key: LOGGING_LEVEL_ROOT
        value: WARN
