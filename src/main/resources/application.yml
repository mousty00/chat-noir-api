spring:
  application:
    name: chat_noir

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/chat_noir}
    username: ${PGUSER:postgres}
    password: ${PGPASSWORD:}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE:5}
      minimum-idle: ${SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE:1}
      idle-timeout: 30000
      connection-timeout: 20000
      max-lifetime: 1800000

  sql:
    init:
      mode: ${SQL_INIT_MODE:never}
      data-locations: classpath:data.sql
      continue-on-error: true

  jpa:
    defer-datasource-initialization: true
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true

  graphql:
    graphiql:
      enabled: ${GRAPHIQL_ENABLED:false}
      path: /graphiql

  servlet:
    multipart:
      max-file-size: 15MB
      max-request-size: 15MB

  cache:
    type: caffeine

server:
  port: ${PORT:8080}
  servlet:
    context-path: /api
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/plain
    min-response-size: 1024

app:
  base-url: ${APP_BASE_URL:}

frontend:
  domain: ${FRONTEND_DOMAIN:localhost:3000}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,https://chatnoir.fun}

jwt:
  secret: ${JWT_SECRET:}
  expiration: ${JWT_EXPIRATION:86400000}

aws:
  accessKeyId: ${AWS_ACCESS_KEY_ID:}
  secretKey: ${AWS_SECRET_ACCESS_KEY:}
  region: ${AWS_REGION:eu-north-1}
  s3:
    bucket: ${AWS_S3_BUCKET:s3-chat-noir-test}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
  health:
    db:
      enabled: false
    diskspace:
      enabled: false
  info:
    env:
      enabled: true

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] [%X{correlationId}] %-5level %logger{36} - %msg%n"
  level:
    root: ${LOGGING_LEVEL_ROOT:WARN}
    com.mousty00.chat_noir_api: ${LOGGING_LEVEL_APP:INFO}
    org.hibernate.SQL: WARN
    org.springframework.security: WARN

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: alpha
    tagsSorter: alpha
    try-it-out-enabled: true
    filter: true

resilience4j:
  ratelimiter:
    instances:
      standardApi:
        limit-for-period: 100
        limit-refresh-period: 1m
        timeout-duration: 5s
      premiumApi:
        limit-for-period: 1000
        limit-refresh-period: 1m
        timeout-duration: 10s
      authentication:
        limit-for-period: 10
        limit-refresh-period: 1m
        timeout-duration: 3s
