spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/chat_noir}
    username: ${PGUSER:}
    password: ${PGPASSWORD:}

  sql:
    init:
      mode: always

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false

  graphql:
    graphiql:
      enabled: true

management:
  endpoint:
    health:
      show-details: always

jwt:
  secret: ${JWT_SECRET:dev-only-secret-not-for-production-use!}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}

logging:
  level:
    com.mousty00.chat_noir_api: DEBUG
    org.springframework.security: INFO

springdoc:
  swagger-ui:
    enabled: true
  api-docs:
    enabled: true
