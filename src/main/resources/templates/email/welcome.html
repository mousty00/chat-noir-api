<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to Chat Noir</title>
</head>
<body style="margin:0;padding:0;background-color:#f5f1ea;font-family:Georgia,'Times New Roman',serif;color:#1e1b18;">
<table role="presentation" style="width:100%;border-collapse:collapse;background-color:#f5f1ea;">
    <tr>
        <td align="center" style="padding:32px 16px;">
            <table role="presentation" style="width:100%;max-width:620px;border-collapse:collapse;background-color:#fffdf8;border:1px solid #e3d8c7;">
                <tr>
                    <td style="padding:40px 36px 24px;text-align:center;background:linear-gradient(135deg,#20140f,#5c3627);color:#f7efe5;">
                        <div style="font-size:13px;letter-spacing:3px;text-transform:uppercase;opacity:0.85;">Chat Noir</div>
                        <h1 style="margin:16px 0 0;font-size:32px;line-height:1.2;font-weight:normal;">Welcome aboard</h1>
                    </td>
                </tr>
                <tr>
                    <td style="padding:32px 36px 40px;">
                        <p style="margin:0 0 16px;font-size:18px;line-height:1.6;">Hi <strong th:text="${username}">there</strong>,</p>
                        <p style="margin:0 0 16px;font-size:16px;line-height:1.7;">
                            Your Chat Noir account is ready. You can now explore the collection, save favorites, and keep track of the cats you like most.
                        </p>
                        <p style="margin:0 0 28px;font-size:16px;line-height:1.7;">
                            Start here whenever you are ready.
                        </p>
                        <p style="margin:0 0 32px;text-align:center;">
                            <a th:href="${homeUrl}" href="https://chatnoir.fun"
                               style="display:inline-block;padding:14px 28px;background-color:#1e1b18;color:#fffdf8;text-decoration:none;font-size:15px;letter-spacing:0.5px;">
                                Open Chat Noir
                            </a>
                        </p>
                        <p style="margin:0;font-size:14px;line-height:1.7;color:#6c6258;">
                            If you did not create this account, you can ignore this email.
                        </p>
                    </td>
                </tr>
            </table>
        </td>
    </tr>
</table>
</body>
</html>
